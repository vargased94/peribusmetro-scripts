name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret lengths
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
          DATABASE_URL_DEV: ${{ secrets.DATABASE_URL_DEV }}
          DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
          DATABASE_POOLER_URL_DEV: ${{ secrets.DATABASE_POOLER_URL_DEV }}
          SQL_SERVER_HOST: ${{ secrets.SQL_SERVER_HOST }}
          SQL_SERVER_PORT: ${{ secrets.SQL_SERVER_PORT }}
          SQL_SERVER_USER: ${{ secrets.SQL_SERVER_USER }}
          SQL_SERVER_PASSWORD: ${{ secrets.SQL_SERVER_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BACKUP_NOTIFY_EMAILS: ${{ secrets.BACKUP_NOTIFY_EMAILS }}
        run: |
          echo "DATABASE_URL_PROD length: ${#DATABASE_URL_PROD}"
          echo "DATABASE_URL_DEV length: ${#DATABASE_URL_DEV}"
          echo "DATABASE_POOLER_URL length: ${#DATABASE_POOLER_URL}"
          echo "DATABASE_POOLER_URL_DEV length: ${#DATABASE_POOLER_URL_DEV}"
          echo "SQL_SERVER_HOST length: ${#SQL_SERVER_HOST}"
          echo "SQL_SERVER_PORT length: ${#SQL_SERVER_PORT}"
          echo "SQL_SERVER_USER length: ${#SQL_SERVER_USER}"
          echo "SQL_SERVER_PASSWORD length: ${#SQL_SERVER_PASSWORD}"
          echo "RESEND_API_KEY length: ${#RESEND_API_KEY}"
          echo "BACKUP_NOTIFY_EMAILS length: ${#BACKUP_NOTIFY_EMAILS}"

          # Check if pooler starts with postgresql:
          if [[ "$DATABASE_POOLER_URL_DEV" == postgresql://* ]]; then
            echo "DATABASE_POOLER_URL_DEV: starts with postgresql:// OK"
          else
            echo "DATABASE_POOLER_URL_DEV: does NOT start with postgresql://"
            echo "First 15 chars (will be masked if secret): ${DATABASE_POOLER_URL_DEV:0:15}"
          fi
