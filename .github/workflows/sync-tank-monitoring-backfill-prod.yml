name: "Sync Tank Monitoring — Backfill (PROD)"

# Workflow manual para hacer backfill de un rango específico en PROD.
# Usar SOLO cuando se necesite tapar un hueco histórico o re-procesar
# días específicos. El modo automático lo cubre el workflow regular.

on:
  workflow_dispatch:
    inputs:
      from:
        description: "Fecha inicio (YYYY-MM-DD)"
        required: true
      to:
        description: "Fecha fin (YYYY-MM-DD)"
        required: true

jobs:
  backfill:
    name: Backfill Tank Monitoring PROD
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set timestamp
        run: |
          FECHA=$(TZ="America/Mexico_City" date +"%d/%m/%Y %H:%M:%S")
          echo "FECHA_MX=${FECHA}" >> $GITHUB_ENV

      - name: Create .env file
        env:
          DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          TOTHEM_HOST: ${{ secrets.TOTHEM_HOST }}
          TOTHEM_API_USUARIO: ${{ secrets.TOTHEM_API_USUARIO }}
          TOTHEM_API_KEY: ${{ secrets.TOTHEM_API_KEY }}
        run: |
          {
            echo "DATABASE_POOLER_URL=${DATABASE_POOLER_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "TOTHEM_HOST=${TOTHEM_HOST}"
            echo "TOTHEM_API_USUARIO=${TOTHEM_API_USUARIO}"
            echo "TOTHEM_API_KEY=${TOTHEM_API_KEY}"
          } > .env.production

      - name: "Run backfill"
        env:
          INPUT_FROM: ${{ inputs.from }}
          INPUT_TO: ${{ inputs.to }}
        run: |
          set -o pipefail
          DOTENV_CONFIG_PATH=.env.production node --env-file=.env.production \
            scripts/sync-tank-monitoring.mjs --from "$INPUT_FROM" --to "$INPUT_TO" 2>&1 | tee /tmp/sync-tanks.log

          SUMMARY=$(grep "^::SUMMARY_JSON::" /tmp/sync-tanks.log | tail -1 | sed 's/^::SUMMARY_JSON:://' || echo '{}')
          echo "SYNC_TANKS_JSON<<SUMMARY_EOF" >> $GITHUB_ENV
          echo "${SUMMARY}" >> $GITHUB_ENV
          echo "SUMMARY_EOF" >> $GITHUB_ENV

      - name: Clean up env file
        if: always()
        run: rm -f .env.production

      - name: Summary
        if: always()
        env:
          SYNC_TANKS_JSON: ${{ env.SYNC_TANKS_JSON }}
          FECHA_MX: ${{ env.FECHA_MX }}
          JOB_STATUS: ${{ job.status }}
          INPUT_FROM: ${{ inputs.from }}
          INPUT_TO: ${{ inputs.to }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            echo "### ✅ Backfill Tank Monitoring PROD completado" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Backfill Tank Monitoring PROD falló" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** ${FECHA_MX}" >> $GITHUB_STEP_SUMMARY
          echo "**Rango solicitado:** ${INPUT_FROM} → ${INPUT_TO}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          node <<'NODE_EOF' >> $GITHUB_STEP_SUMMARY
          const safeParse = (raw) => { try { return JSON.parse(raw || "{}"); } catch { return {}; } };
          const r = safeParse(process.env.SYNC_TANKS_JSON);
          const out = [];
          if (r.script) {
            out.push(`_Tiempo: ${r.elapsed_seconds ?? "?"}s_`);
            out.push("");
            out.push("| Días | Lecturas API | Insertadas | Duplicadas | Errores |");
            out.push("|---:|---:|---:|---:|---:|");
            out.push(`| ${r.days ?? 0} | ${r.fetched ?? 0} | ${r.inserted ?? 0} | ${r.skipped ?? 0} | ${r.errors ?? 0} |`);
          } else {
            out.push("_Sin datos_");
          }
          out.push("");
          console.log(out.join("\n"));
          NODE_EOF
