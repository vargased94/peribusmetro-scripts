name: "Sync Tank Monitoring (PROD)"

# Sincroniza lecturas del API Tothem (sitio 130 - monitoreo) hacia
# la tabla `diesel_tank_monitoring` en Supabase PROD.
#
# - Schedule: diario 05:00 AM hora de México (CST/UTC-6 = 11:00 UTC)
# - Manual: workflow_dispatch con inputs `from`/`to` para backfill.

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  FROM_EMAIL: "Peribus Metropolitano <admin@peribusmetro.mx>"

jobs:
  sync-tanks:
    name: Sync Tank Monitoring to Supabase PROD
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set timestamp
        run: |
          FECHA=$(TZ="America/Mexico_City" date +"%d/%m/%Y %H:%M:%S")
          echo "FECHA_MX=${FECHA}" >> $GITHUB_ENV

      - name: Create .env file
        env:
          DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          TOTHEM_HOST: ${{ secrets.TOTHEM_HOST }}
          TOTHEM_API_USUARIO: ${{ secrets.TOTHEM_API_USUARIO }}
          TOTHEM_API_KEY: ${{ secrets.TOTHEM_API_KEY }}
        run: |
          {
            echo "DATABASE_POOLER_URL=${DATABASE_POOLER_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "TOTHEM_HOST=${TOTHEM_HOST}"
            echo "TOTHEM_API_USUARIO=${TOTHEM_API_USUARIO}"
            echo "TOTHEM_API_KEY=${TOTHEM_API_KEY}"
          } > .env.production

      - name: "Run sync-tank-monitoring (modo auto)"
        run: |
          set -o pipefail
          DOTENV_CONFIG_PATH=.env.production node --env-file=.env.production scripts/sync-tank-monitoring.mjs 2>&1 | tee /tmp/sync-tanks.log

          SUMMARY=$(grep "^::SUMMARY_JSON::" /tmp/sync-tanks.log | tail -1 | sed 's/^::SUMMARY_JSON:://' || echo '{}')
          echo "SYNC_TANKS_JSON<<SUMMARY_EOF" >> $GITHUB_ENV
          echo "${SUMMARY}" >> $GITHUB_ENV
          echo "SUMMARY_EOF" >> $GITHUB_ENV

      - name: Clean up env file
        if: always()
        run: rm -f .env.production

      - name: Send success email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.BACKUP_NOTIFY_EMAILS }}
          SYNC_TANKS_JSON: ${{ env.SYNC_TANKS_JSON }}
        run: |
          TO_JSON=$(echo "$NOTIFY_EMAILS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | awk '{printf "\"%s\",", $0}' | sed 's/,$//')

          DAYS=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).days ?? 0)}catch{console.log(0)}})" || echo "0")
          FETCHED=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).fetched ?? 0)}catch{console.log(0)}})" || echo "0")
          INSERTED=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).inserted ?? 0)}catch{console.log(0)}})" || echo "0")
          SKIPPED=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).skipped ?? 0)}catch{console.log(0)}})" || echo "0")
          ELAPSED=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).elapsed_seconds ?? 0)}catch{console.log(0)}})" || echo "0")
          FROM_D=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).from ?? '-')}catch{console.log('-')}})" || echo "-")
          TO_D=$(echo "${SYNC_TANKS_JSON}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).to ?? '-')}catch{console.log('-')}})" || echo "-")

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "from": "${FROM_EMAIL}",
            "to": [${TO_JSON}],
            "subject": "✅ Sync Tank Monitoring PROD - ${FECHA_MX}",
            "html": "<div style='font-family: Arial, sans-serif; max-width: 640px; margin: 0 auto;'><div style='background: #16a34a; color: white; padding: 20px; border-radius: 8px 8px 0 0;'><h2 style='margin: 0;'>✅ Sync Tank Monitoring (PROD)</h2></div><div style='padding: 20px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px;'><table style='width: 100%; border-collapse: collapse;'><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Fecha</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${FECHA_MX}</td></tr><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Rango procesado</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${FROM_D} → ${TO_D} (${DAYS} día(s))</td></tr><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Lecturas API</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${FETCHED}</td></tr><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Insertadas</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${INSERTED}</td></tr><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Duplicadas (omitidas)</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${SKIPPED}</td></tr><tr><td style='padding: 8px; font-weight: bold;'>Tiempo total</td><td style='padding: 8px;'>${ELAPSED}s</td></tr></table></div><p style='color: #6b7280; font-size: 12px; margin-top: 16px; text-align: center;'>peribus-scripts — Tank monitoring (5:00 AM MX)</p></div>"
          }
          EOF

      - name: Send failure email
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAILS: ${{ secrets.BACKUP_NOTIFY_EMAILS }}
        run: |
          TO_JSON=$(echo "$NOTIFY_EMAILS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | awk '{printf "\"%s\",", $0}' | sed 's/,$//')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "from": "${FROM_EMAIL}",
            "to": [${TO_JSON}],
            "subject": "❌ ERROR Sync Tank Monitoring PROD - ${FECHA_MX}",
            "html": "<div style='font-family: Arial, sans-serif; max-width: 640px; margin: 0 auto;'><div style='background: #dc2626; color: white; padding: 20px; border-radius: 8px 8px 0 0;'><h2 style='margin: 0;'>❌ Error en Sync Tank Monitoring (PROD)</h2></div><div style='padding: 20px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 8px 8px;'><p style='color: #374151;'>El sync de monitoreo de tanques en <strong>PROD</strong> ha fallado.</p><table style='width: 100%; border-collapse: collapse;'><tr><td style='padding: 8px; border-bottom: 1px solid #f3f4f6; font-weight: bold;'>Fecha</td><td style='padding: 8px; border-bottom: 1px solid #f3f4f6;'>${FECHA_MX}</td></tr><tr><td style='padding: 8px; font-weight: bold;'>Ambiente</td><td style='padding: 8px;'>Production</td></tr></table><div style='margin-top: 20px; text-align: center;'><a href='${RUN_URL}' style='display: inline-block; background: #dc2626; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold;'>Ver logs</a></div></div></div>"
          }
          EOF

      - name: Summary
        if: always()
        env:
          SYNC_TANKS_JSON: ${{ env.SYNC_TANKS_JSON }}
          FECHA_MX: ${{ env.FECHA_MX }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            echo "### ✅ Sync Tank Monitoring PROD completado" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Sync Tank Monitoring PROD falló" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** ${FECHA_MX}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          node <<'NODE_EOF' >> $GITHUB_STEP_SUMMARY
          const safeParse = (raw) => { try { return JSON.parse(raw || "{}"); } catch { return {}; } };
          const r = safeParse(process.env.SYNC_TANKS_JSON);

          const out = [];
          out.push("#### Resumen");
          if (r.script) {
            out.push(`_Tiempo: ${r.elapsed_seconds ?? "?"}s_`);
            out.push("");
            out.push("| Rango | Días | Lecturas API | Insertadas | Duplicadas | Errores |");
            out.push("|---|---:|---:|---:|---:|---:|");
            out.push(`| ${r.from ?? "-"} → ${r.to ?? "-"} | ${r.days ?? 0} | ${r.fetched ?? 0} | ${r.inserted ?? 0} | ${r.skipped ?? 0} | ${r.errors ?? 0} |`);
          } else {
            out.push("_Sin datos_");
          }
          out.push("");

          console.log(out.join("\n"));
          NODE_EOF
